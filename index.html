<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix - Character Selection</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
        }
        canvas { 
            border: 2px solid #00ff00; 
            image-rendering: pixelated; 
            width: 512px; 
            height: 480px; 
            display: none;
            box-shadow: 0 0 20px #00ff00;
        }
        
        #login-screen, #scene-screen { text-align: center; max-width: 600px; }
        #scene-screen { display: none; }

        .char-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .char-card {
            border: 2px solid #005500;
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            background-color: #001100;
        }
        .char-card:hover {
            border-color: #00ff00;
            background-color: #003300;
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ff00;
        }
        .char-card img {
            width: 100px;
            height: 100px;
            image-rendering: pixelated;
            margin-bottom: 10px;
        }

        /* Стиль для сюжетної сцени */
        .office-scene {
            width: 100%;
            max-width: 500px;
            border: 1px solid #00ff00;
            image-rendering: pixelated;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #004400;
        }

        .loading-text {
            font-size: 24px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        input[type="text"] {
            background-color: #000; color: #00ff00; border: 1px solid #00ff00;
            font-family: 'Courier New', Courier, monospace; font-size: 20px;
            padding: 8px; text-transform: uppercase; text-align: center;
            width: 180px; margin-bottom: 10px; outline: none;
        }
        
        .start-btn {
            background-color: #003300; color: #00ff00; border: 1px solid #00ff00;
            padding: 10px 20px; cursor: pointer; font-family: 'Courier New', monospace;
        }
        .start-btn:hover { background-color: #00ff00; color: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ОБЕРІТЬ СВОГО АВАТАРА</h2>
        <div class="char-container">
            <div class="char-card" onclick="prepareScene('OLEH')">
                <img src="oleh.png" alt="Олег">
                <div class="char-name">ОЛЕГ</div>
            </div>
            <div class="char-card" onclick="prepareScene('VIKTOR')">
                <img src="viktor.png" alt="Віктор">
                <div class="char-name">ВІКТОР</div>
            </div>
            <div class="char-card" onclick="prepareScene('VOLODY')">
                <img src="volodymyr.png" alt="Володимир">
                <div class="char-name">ВОЛОДИМИР</div>
            </div>
        </div>
        <p>АБО ВВЕДІТЬ КОДОВЕ ІМ'Я:</p>
        <input type="text" id="userName" maxlength="6" placeholder="NEO">
        <button class="start-btn" onclick="prepareScene()">ІНІЦІАЛІЗАЦІЯ</button>
    </div>

    <div id="scene-screen">
        <h2 id="scene-title">ЛОКАЦІЯ: ОФІС 2026</h2>
        <img src="Vov1.png" class="office-scene" alt="Office Scene">
        <p class="loading-text">ВСТАНОВЛЕННЯ ЗВ'ЯЗКУ З <span id="target-name">...</span></p>
    </div>

    <canvas id="nes-canvas" width="256" height="240"></canvas>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(256, 240);
        const buf = new Uint32Array(imageData.data.buffer);

        const nes = new jsnes.NES({
            onFrame: (frameBuffer) => {
                for (var i = 0; i < 256 * 240; i++) buf[i] = 0xFF000000 | frameBuffer[i];
                ctx.putImageData(imageData, 0, 0);
            }
        });

        // Функція для показу сюжетної сцени перед грою
        function prepareScene(name) {
            if (name) document.getElementById('userName').value = name;
            let finalName = document.getElementById('userName').value.toUpperCase() || "NEO";
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('scene-screen').style.display = 'block';
            document.getElementById('target-name').innerText = finalName;

            // Через 3 секунди автоматично запускаємо гру
            setTimeout(() => {
                startMatrix(finalName);
            }, 3000);
        }

        async function startMatrix(nameInput) {
            document.getElementById('scene-screen').style.display = 'none';
            canvas.style.display = 'block';

            nameInput = nameInput.replace(/[^A-Z0-9 ]/g, '').padEnd(6, ' ').substring(0, 6);

            try {
                const response = await fetch('matrix.nes');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);

                let offset = -1;
                for (let i = 0; i < data.length - 6; i++) {
                    if (data[i] === 86 && data[i+1] === 73 && data[i+2] === 75 &&
                        data[i+3] === 84 && data[i+4] === 79 && data[i+5] === 82) {
                        offset = i; break;
                    }
                }
                if (offset !== -1) {
                    for (let i = 0; i < 6; i++) data[offset + i] = nameInput.charCodeAt(i);
                }

                let binary = "";
                for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
                nes.loadROM(binary);
                
                window.addEventListener("keydown", (e) => keyboard(e.keyCode, 'down'));
                window.addEventListener("keyup", (e) => keyboard(e.keyCode, 'up'));
                setInterval(() => { nes.frame(); }, 16.6);
            } catch (err) { alert(err); }
        }

        const keyboard = (keyCode, event) => {
            const map = { 38: 16, 40: 32, 37: 64, 39: 128, 88: 1, 90: 2, 13: 8, 32: 4 };
            if (map[keyCode]) {
                event === 'down' ? nes.buttonDown(1, map[keyCode]) : nes.buttonUp(1, map[keyCode]);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix - Character Selection</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            user-select: none;
            position: relative; /* 袛谢褟 械褎械泻褌褍 屑芯薪褨褌芯褉邪 */
        }
        
        /* 袝褎械泻褌 褋褌邪褉芯谐芯 褌械谢械胁褨蟹芯褉邪 (Scanlines) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none; /* 些芯斜 薪械 蟹邪胁邪卸邪谢芯 泻谢褨泻邪褌懈 */
        }

        /* 袟邪写薪褨泄 褎芯薪 蟹 袦邪褌褉懈褔薪懈屑 写芯褖械屑 */
        #matrix-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.5;
        }
        
        /* 袝泻褉邪薪 谢芯谐褨薪褍 */
        #login-screen { text-align: center; max-width: 600px; z-index: 10; position: relative; }
        
        /* 袗薪褨屑邪褑褨褟 袚谢褨褌褔褍 写谢褟 蟹邪谐芯谢芯胁泻邪 */
        h2 { text-shadow: 2px 0px 5px #00ff00, -2px 0px 5px #008800; animation: glitch 3s infinite; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        .char-container { display: flex; gap: 30px; justify-content: center; margin-bottom: 30px; margin-top: 20px;}
        
        /* 袣邪褉褌泻懈 谐械褉芯褩胁 + 袗薪褨屑邪褑褨褟 谢械胁褨褌邪褑褨褩 */
        .char-card { 
            border: 2px solid #005500; padding: 15px; cursor: pointer; transition: 0.3s; 
            background-color: rgba(0, 17, 0, 0.8); 
            animation: float 4s ease-in-out infinite; /* 袥械胁褨褌邪褑褨褟 */
        }
        /* 袪褨蟹薪邪 蟹邪褌褉懈屑泻邪, 褖芯斜 胁芯薪懈 谐芯泄写邪谢懈褋褟 薪械 芯写薪芯褔邪褋薪芯 */
        .char-card:nth-child(1) { animation-delay: 0s; }
        .char-card:nth-child(2) { animation-delay: 1.5s; }
        .char-card:nth-child(3) { animation-delay: 3s; }
        
        @keyframes float {
            0% { transform: translateY(0px); box-shadow: 0 0 5px #005500; }
            50% { transform: translateY(-15px); box-shadow: 0 15px 15px #00ff00; border-color: #00ff00; }
            100% { transform: translateY(0px); box-shadow: 0 0 5px #005500; }
        }

        .char-card:hover { background-color: #003300; transform: scale(1.1) !important; animation-play-state: paused; }
        .char-card img { width: 100px; height: 100px; image-rendering: pixelated; margin-bottom: 10px; }
        .char-name { font-weight: bold; font-size: 18px; text-shadow: 0 0 5px #00ff00;}
        
        input[type="text"] { background-color: #000; color: #00ff00; border: 1px solid #00ff00; font-family: 'Courier New', Courier, monospace; font-size: 20px; padding: 8px; text-transform: uppercase; text-align: center; width: 180px; margin-bottom: 10px; outline: none; z-index: 10; position: relative;}
        .start-btn { background-color: #003300; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 18px; z-index: 10; position: relative;}
        .start-btn:hover { background-color: #00ff00; color: #000; box-shadow: 0 0 10px #00ff00;}
        #error-msg { margin-top: 15px; font-weight: bold; min-height: 24px; text-shadow: 0 0 5px red; }

        /* 袝泻褉邪薪 褨褋褌芯褉褨褩 褌邪 谐褉懈 */
        #scene-screen { display: none; text-align: center; max-width: 600px; z-index: 10; position: relative;}
        .office-scene { width: 100%; max-width: 500px; border: 2px solid #00ff00; image-rendering: pixelated; margin-bottom: 20px; box-shadow: 0 0 30px #008800; }
        .loading-text { font-size: 24px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        canvas#nes-canvas { border: 2px solid #00ff00; image-rendering: pixelated; width: 512px; height: 480px; display: none; box-shadow: 0 0 30px #00ff00; z-index: 10; position: relative;}
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="login-screen">
        <h2>袨袘袝袪袉孝鞋 小袙袨袚袨 袗袙袗孝袗袪袗</h2>
        <div class="char-container">
            <div class="char-card" onclick="prepareScene('OLEH')">
                <img src="oleh.png" alt="袨谢械谐">
                <div class="char-name">袨袥袝袚</div>
            </div>
            <div class="char-card" onclick="prepareScene('VIKTOR')">
                <img src="viktor.png" alt="袙褨泻褌芯褉">
                <div class="char-name">袙袉袣孝袨袪</div>
            </div>
            <div class="char-card" onclick="prepareScene('VOLODY')">
                <img src="volodymyr.png" alt="袙芯谢芯写懈屑懈褉">
                <div class="char-name">袙袨袥袨袛袠袦袠袪</div>
            </div>
        </div>
        <p>袗袘袨 袙袙袝袛袉孝鞋 袣袨袛袨袙袝 袉袦'携:</p>
        <input type="text" id="userName" maxlength="6" placeholder="NEO">
        <br>
        <button class="start-btn" onclick="prepareScene()">袉袧袉笑袉袗袥袉袟袗笑袉携</button>
        <p id="error-msg" style="color: red; display: none;"></p>
    </div>

    <div id="scene-screen">
        <h2 id="scene-title">袥袨袣袗笑袉携: 袨肖袉小 2026</h2>
        <img src="Vov1.png" class="office-scene" alt="Office Scene">
        <p class="loading-text">袙小孝袗袧袨袙袥袝袧袧携 袟袙'携袟袣校 袟 <span id="target-name">...</span></p>
    </div>

    <canvas id="nes-canvas" width="256" height="240"></canvas>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        // --- 袗袧袉袦袗笑袉携 袦袗孝袪袠效袧袨袚袨 袛袨些校 (HTML Canvas) ---
        const bgCanvas = document.getElementById('matrix-bg');
        const bgCtx = bgCanvas.getContext('2d');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789袗袘袙袚袛袆袞袟袠袉袊袡袣袥袦袧袨袩袪小孝校肖啸笑效楔些鞋挟携'.split('');
        const fontSize = 16;
        const columns = bgCanvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;

        function drawBg() {
            bgCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = '#0F0';
            bgCtx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                bgCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > bgCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        let bgInterval = setInterval(drawBg, 33); // 袟邪锌褍褋泻邪褦屑芯 写芯褖

        // --- 袥袨袚袉袣袗 袩袝袪袝啸袨袛袉袙 ---
        function prepareScene(name) {
            if (name) document.getElementById('userName').value = name;
            let rawInput = document.getElementById('userName').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (/[袗-携邪-褟衼褢袉褨袊褩袆褦覑覒]/.test(rawInput)) {
                errorMsg.innerText = "楔芯 褌懈 谐芯谢芯胁邪?";
                errorMsg.style.display = 'block';
                return;
            }

            let finalName = rawInput.toUpperCase().replace(/[^A-Z0-9 ]/g, '') || "NEO";
            
            // 啸芯胁邪褦屑芯 屑械薪褞 褨 胁懈屑懈泻邪褦屑芯 褎芯薪芯胁懈泄 写芯褖 (褖芯斜 薪械 谐邪谢褜屑褍胁邪谢芯 谐褉褍)
            document.getElementById('login-screen').style.display = 'none';
            clearInterval(bgInterval); 
            document.getElementById('matrix-bg').style.display = 'none';

            // 袩芯泻邪蟹褍褦屑芯 褋褞卸械褌
            document.getElementById('scene-screen').style.display = 'block';
            document.getElementById('target-name').innerText = finalName;

            setTimeout(() => { startMatrix(finalName); }, 3000);
        }

        // --- 袥袨袚袉袣袗 袝袦校袥携孝袨袪袗 NES ---
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(256, 240);
        const buf = new Uint32Array(imageData.data.buffer);

        const nes = new jsnes.NES({
            onFrame: (frameBuffer) => {
                for (var i = 0; i < 256 * 240; i++) buf[i] = 0xFF000000 | frameBuffer[i];
                ctx.putImageData(imageData, 0, 0);
            }
        });

        async function startMatrix(nameInput) {
            document.getElementById('scene-screen').style.display = 'none';
            canvas.style.display = 'block';
            nameInput = nameInput.padEnd(6, ' ').substring(0, 6);

            try {
                const response = await fetch('matrix.nes');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);

                let offset = -1;
                for (let i = 0; i < data.length - 6; i++) {
                    if (data[i] === 86 && data[i+1] === 73 && data[i+2] === 75 &&
                        data[i+3] === 84 && data[i+4] === 79 && data[i+5] === 82) {
                        offset = i; break;
                    }
                }
                if (offset !== -1) {
                    for (let i = 0; i < 6; i++) data[offset + i] = nameInput.charCodeAt(i);
                }

                let binary = "";
                for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
                nes.loadROM(binary);
                
                const keyboard = (keyCode, event) => {
                    const map = { 38: 16, 40: 32, 37: 64, 39: 128, 88: 1, 90: 2, 13: 8, 32: 4 };
                    if (map[keyCode]) event === 'down' ? nes.buttonDown(1, map[keyCode]) : nes.buttonUp(1, map[keyCode]);
                };
                window.addEventListener("keydown", (e) => keyboard(e.keyCode, 'down'));
                window.addEventListener("keyup", (e) => keyboard(e.keyCode, 'up'));

                setInterval(() => { nes.frame(); }, 16.6);
            } catch (err) { alert("小懈褋褌械屑薪邪 锌芯屑懈谢泻邪: " + err.message); }
        }
    </script>
</body>
</html>

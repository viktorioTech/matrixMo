<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix - Viktor</title>
    <style>
        body { background-color: #000; color: #00ff00; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        canvas { border: 2px solid #00ff00; image-rendering: pixelated; width: 512px; height: 480px; }
        .status { margin-top: 15px; color: #008800; }
    </style>
</head>
<body>
    <h2 id="header">КЛІКНІТЬ, ЩОБ ЗАПУСТИТИ МАТРИЦЮ</h2>
    <canvas id="nes-canvas" width="256" height="240"></canvas>
    <div class="status">Керування: Стрілки та клавіші Z, X, Enter, Space</div>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(256, 240);
        const buf = new Uint32Array(imageData.data.buffer);

        const nes = new jsnes.NES({
            onFrame: (frameBuffer) => {
                for (var i = 0; i < 256 * 240; i++) buf[i] = 0xFF000000 | frameBuffer[i];
                ctx.putImageData(imageData, 0, 0);
            }
        });

        async function start() {
            document.getElementById('header').innerText = "ЗАВАНТАЖЕННЯ...";
            try {
                const response = await fetch('matrix.nes');
                if (!response.ok) throw new Error('Файл matrix.nes не знайдено');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                let binary = "";
                for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
                
                nes.loadROM(binary);
                document.getElementById('header').innerText = "WAKE UP, VIKTOR...";
                
                setInterval(() => { nes.frame(); }, 16.6);
            } catch (err) {
                document.getElementById('header').style.color = "red";
                document.getElementById('header').innerText = err.message;
            }
        }

        window.onclick = () => { if (!nes.isRunning) start(); };
    </script>
</body>
</html>

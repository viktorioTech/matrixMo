<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix - Character Selection</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
        }
        canvas { 
            border: 2px solid #00ff00; 
            image-rendering: pixelated; 
            width: 512px; 
            height: 480px; 
            display: none;
            box-shadow: 0 0 20px #00ff00;
        }
        .status { margin-top: 15px; color: #008800; display: none; }
        
        #login-screen { text-align: center; max-width: 400px; }
        
        /* Стилі для поля введення */
        input[type="text"] {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            padding: 10px;
            text-transform: uppercase;
            text-align: center;
            outline: none;
            width: 200px;
            margin-bottom: 10px;
        }

        /* Кнопки вибору персонажів */
        .char-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .char-btn {
            background-color: #001100;
            color: #00ff00;
            border: 1px solid #008800;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .char-btn:hover {
            background-color: #004400;
            border-color: #00ff00;
        }

        /* Основна кнопка запуску */
        .start-btn {
            background-color: #003300;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            padding: 12px 24px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .start-btn:hover { background-color: #00ff00; color: #000; }
        
        #error-msg { margin-top: 15px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ОБЕРІТЬ ГЕРОЯ</h2>
        
        <div class="char-selector">
            <button class="char-btn" onclick="selectChar('OLEH')">ОЛЕГ</button>
            <button class="char-btn" onclick="selectChar('VIKTOR')">ВІКТОР</button>
            <button class="char-btn" onclick="selectChar('VOLODY')">ВОЛОДИМИР</button>
        </div>

        <p>АБО ВВЕДІТЬ ВЛАСНЕ ІМ'Я:</p>
        <input type="text" id="userName" maxlength="6" placeholder="NEO" autocomplete="off" spellcheck="false"><br>
        
        <button class="start-btn" onclick="startMatrix()">ІНІЦІАЛІЗАЦІЯ</button>
        <p id="error-msg" style="color: red; display: none;"></p>
    </div>

    <canvas id="nes-canvas" width="256" height="240"></canvas>
    <div class="status" id="controls">Керування: Стрілки та клавіші Z, X, Enter, Space</div>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(256, 240);
        const buf = new Uint32Array(imageData.data.buffer);

        const nes = new jsnes.NES({
            onFrame: (frameBuffer) => {
                for (var i = 0; i < 256 * 240; i++) buf[i] = 0xFF000000 | frameBuffer[i];
                ctx.putImageData(imageData, 0, 0);
            }
        });

        // Функція для кнопок швидкого вибору
        function selectChar(name) {
            document.getElementById('userName').value = name;
            startMatrix(); // Одразу запускаємо
        }

        async function startMatrix() {
            let rawInput = document.getElementById('userName').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            // Перевірка на кирилицю (пасхалка)
            const cyrillicPattern = /[А-Яа-яЁёІіЇїЄєҐґ]/;
            if (cyrillicPattern.test(rawInput)) {
                errorMsg.innerText = "Шо ти голова?";
                errorMsg.style.display = 'block';
                return;
            }

            let nameInput = rawInput.toUpperCase().replace(/[^A-Z0-9 ]/g, '');
            if (nameInput === "") nameInput = "NEO";
            nameInput = nameInput.padEnd(6, ' ').substring(0, 6);

            document.getElementById('login-screen').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('controls').style.display = 'block';

            try {
                const response = await fetch('matrix.nes');
                if (!response.ok) throw new Error('Картридж не знайдено!');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);

                // Патчимо ім'я в ROM
                let offset = -1;
                for (let i = 0; i < data.length - 6; i++) {
                    if (data[i] === 86 && data[i+1] === 73 && data[i+2] === 75 &&
                        data[i+3] === 84 && data[i+4] === 79 && data[i+5] === 82) {
                        offset = i;
                        break;
                    }
                }

                if (offset !== -1) {
                    for (let i = 0; i < 6; i++) {
                        data[offset + i] = nameInput.charCodeAt(i);
                    }
                }

                let binary = "";
                for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
                nes.loadROM(binary);
                
                // Клавіатура
                const keyboard = (keyCode, event) => {
                    const map = { 38: 16, 40: 32, 37: 64, 39: 128, 88: 1, 90: 2, 13: 8, 32: 4 };
                    if (map[keyCode]) {
                        event === 'down' ? nes.buttonDown(1, map[keyCode]) : nes.buttonUp(1, map[keyCode]);
                    }
                };
                window.addEventListener("keydown", (e) => keyboard(e.keyCode, 'down'));
                window.addEventListener("keyup", (e) => keyboard(e.keyCode, 'up'));

                setInterval(() => { nes.frame(); }, 16.6);

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
                document.getElementById('login-screen').style.display = 'block';
                canvas.style.display = 'none';
            }
        }
    </script>
</body>
</html>

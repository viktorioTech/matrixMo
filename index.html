<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Matrix Mo 2026 - Evolution</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .ui { position: relative; z-index: 10; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #00ff00; box-shadow: 0 0 20px #004400; max-width: 90%; }
        
        /* Вибір персонажа */
        .char-card { display: inline-block; margin: 15px; cursor: pointer; transition: 0.3s; border: 1px solid #004400; padding: 10px; }
        .char-card:hover { border-color: #00ff00; transform: scale(1.1); box-shadow: 0 0 15px #00ff00; }
        .char-card img { width: 100px; height: 100px; image-rendering: pixelated; }
        
        /* Історія */
        #story-screen, #final-animation { display: none; }
        .story-img { width: 100%; max-width: 500px; border: 1px solid #00ff00; margin-bottom: 20px; }
        .btn { background: #003300; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; font-size: 18px; margin-top: 10px; }
        
        /* Фінальний екран */
        #typing-text { font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #00ff00; }
        #hero-sprite { position: absolute; z-index: 5; display: none; width: 80px; image-rendering: pixelated; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <img id="hero-sprite" src="" alt="Hero">

    <div id="login-screen" class="ui">
        <h2>IDENTIFY YOURSELF</h2>
        <div onclick="startStory('OLEH', 'oleh.png')" class="char-card"><img src="oleh.png"><br>ОЛЕГ</div>
        <div onclick="startStory('VIKTOR', 'viktor.png')" class="char-card"><img src="viktor.png"><br>ВІКТОР</div>
        <div onclick="startStory('VOLODY', 'volodymyr.png')" class="char-card"><img src="volodymyr.png"><br>ВОЛОДИМИР</div>
    </div>

    <div id="story-screen" class="ui">
        <img id="story-img" src="Vov.png" class="story-img">
        <p id="story-text">Система стабільна. Офіс 2026 працює в штатному режимі...</p>
        <button class="btn" onclick="nextStory()">ПРОДОВЖИТИ</button>
    </div>

    <div id="final-animation" class="ui" style="border:none; background:none;">
        <div id="typing-text"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        
        let selectedHero = "";
        let heroImg = "";
        let storyStep = 0;

        // --- МАТРИЧНИЙ ДОЩ (Працює завжди на фоні) ---
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]";
        const fontSize = 16;
        const columns = Math.floor(w / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- ЛОГІКА ІСТОРІЇ ---
        function startStory(name, img) {
            selectedHero = name;
            heroImg = img;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('story-screen').style.display = 'block';
        }

        function nextStory() {
            storyStep++;
            const img = document.getElementById('story-img');
            const txt = document.getElementById('story-text');
            
            if (storyStep === 1) {
                img.src = "Vov1.png";
                txt.innerText = "Зачекайте... щось не так. Код виходить з-під контролю!";
            } else {
                startWakeUp();
            }
        }

        // --- ФІНАЛЬНА АНІМАЦІЯ (БЕЗ ЕМУЛЯТОРА) ---
        function startWakeUp() {
            document.getElementById('story-screen').style.display = 'none';
            document.getElementById('final-animation').style.display = 'block';
            
            const text = `WAKE UP, ${selectedHero}...`;
            let i = 0;
            const target = document.getElementById('typing-text');
            
            function type() {
                if (i < text.length) {
                    target.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 150);
                } else {
                    setTimeout(spawnHero, 1000);
                }
            }
            type();
        }

        function spawnHero() {
            const hero = document.getElementById('hero-sprite');
            hero.src = heroImg;
            hero.style.display = 'block';
            hero.style.left = '50%';
            hero.style.top = '70%';
            hero.style.transform = 'translate(-50%, -50%)';
            
            // Робимо героя "живим" (легке погойдування)
            let angle = 0;
            setInterval(() => {
                angle += 0.1;
                hero.style.marginTop = Math.sin(angle) * 10 + "px";
            }, 30);
        }

        window.onresize = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>

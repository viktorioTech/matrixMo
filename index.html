<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix 2026</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #matrix-bg { position: absolute; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .screen { text-align: center; display: none; max-width: 800px; }
        #login-screen { display: block; } /* Початковий екран */
        
        .char-card { border: 2px solid #005500; padding: 10px; cursor: pointer; display: inline-block; margin: 10px; transition: 0.3s; background: #001100; }
        .char-card:hover { border-color: #00ff00; transform: scale(1.1); box-shadow: 0 0 15px #00ff00; }
        .char-card img { width: 100px; height: 100px; image-rendering: pixelated; }

        .story-img { width: 100%; max-width: 500px; border: 2px solid #00ff00; margin-bottom: 20px; box-shadow: 0 0 20px #004400; }
        .btn { background: #003300; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 18px; }
        canvas#nes-canvas { border: 2px solid #00ff00; width: 512px; height: 480px; display: none; }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="login-screen" class="screen">
        <h2>ОБЕРІТЬ СВОГО АВАТАРА</h2>
        <div onclick="startStory('OLEH')" class="char-card"><img src="oleh.png"><br>ОЛЕГ</div>
        <div onclick="startStory('VIKTOR')" class="char-card"><img src="viktor.png"><br>ВІКТОР</div>
        <div onclick="startStory('VOLODY')" class="char-card"><img src="volodymyr.png"><br>ВОЛОДИМИР</div>
    </div>

    <div id="story-1" class="screen">
        <img src="Vov.png" class="story-img">
        <p>Львів. 2026 рік. Офіс компанії.<br>Звичайний робочий день підходить до кінця...</p>
        <button class="btn" onclick="showStory2()">ПРОДОВЖИТИ</button>
    </div>

    <div id="story-2" class="screen">
        <img src="Vov1.png" class="story-img">
        <p id="anomaly-text">Раптом на моніторі з'являється аномальний код...</p>
        <button class="btn" onclick="launchNES()">УВІЙТИ В МАТРИЦЮ</button>
    </div>

    <canvas id="nes-canvas" width="256" height="240"></canvas>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        let selectedHero = "NEO";

        // Фоновий дощ
        const bg = document.getElementById('matrix-bg');
        const ctxBg = bg.getContext('2d');
        bg.width = window.innerWidth; bg.height = window.innerHeight;
        const drops = Array(Math.floor(bg.width/16)).fill(1);
        function drawRain() {
            ctxBg.fillStyle = 'rgba(0,0,0,0.05)'; ctxBg.fillRect(0,0,bg.width,bg.height);
            ctxBg.fillStyle = '#0F0'; drops.forEach((y, i) => {
                ctxBg.fillText(String.fromCharCode(Math.random()*128), i*16, y*16);
                if(y*16 > bg.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(drawRain, 50);

        // Логіка перемикання екранів
        function startStory(name) {
            selectedHero = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('story-1').style.display = 'block';
        }

        function showStory2() {
            document.getElementById('story-1').style.display = 'none';
            document.getElementById('story-2').style.display = 'block';
            document.getElementById('anomaly-text').innerText = `На моніторі ${selectedHero} з'являється аномальний код...`;
        }

        async function launchNES() {
            document.getElementById('story-2').style.display = 'none';
            const canvas = document.getElementById('nes-canvas');
            canvas.style.display = 'block';

            const nes = new jsnes.NES({
                onFrame: (fb) => {
                    const ctx = canvas.getContext('2d');
                    const img = ctx.createImageData(256, 240);
                    const u32 = new Uint32Array(img.data.buffer);
                    for(let i=0; i<256*240; i++) u32[i] = 0xFF000000 | fb[i];
                    ctx.putImageData(img, 0, 0);
                }
            });

            const res = await fetch('matrix.nes');
            const ab = await res.arrayBuffer();
            const data = new Uint8Array(ab);

            // ШУКАЄМО VIKTOR І ЗАМІНЮЄМО НА HERO
            const pattern = [86, 73, 75, 84, 79, 82]; // V-I-K-T-O-R
            let offset = -1;
            for(let i=0; i<data.length-6; i++) {
                if(pattern.every((byte, j) => data[i+j] === byte)) { offset = i; break; }
            }
            if(offset !== -1) {
                const name = selectedHero.padEnd(6, ' ');
                for(let i=0; i<6; i++) data[offset+i] = name.charCodeAt(i);
            }

            let bin = ""; for(let i=0; i<data.length; i++) bin += String.fromCharCode(data[i]);
            nes.loadROM(bin);
            
            // Керування
            const map = {38:16, 40:32, 37:64, 39:128, 88:1, 90:2, 13:8, 32:4};
            window.onkeydown = (e) => { if(map[e.keyCode]) nes.buttonDown(1, map[e.keyCode]); };
            window.onkeyup = (e) => { if(map[e.keyCode]) nes.buttonUp(1, map[e.keyCode]); };
            
            setInterval(() => nes.frame(), 16);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix - Login</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
        }
        canvas { 
            border: 2px solid #00ff00; 
            image-rendering: pixelated; 
            width: 512px; 
            height: 480px; 
            display: none; /* Ховаємо гру до введення імені */
            box-shadow: 0 0 20px #00ff00;
        }
        .status { margin-top: 15px; color: #008800; display: none; }
        
        /* Стилі для екрана введення */
        #login-screen { text-align: center; }
        input[type="text"] {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            padding: 10px;
            text-transform: uppercase;
            text-align: center;
            outline: none;
            width: 200px;
            box-shadow: 0 0 10px #00ff00;
        }
        button {
            margin-top: 20px;
            background-color: #003300;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #00ff00; color: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>СИСТЕМА АКТИВОВАНА</h2>
        <p>Ідентифікуйте себе (до 6 англійських літер):</p>
        <input type="text" id="userName" maxlength="6" value="NEO" autocomplete="off" spellcheck="false"><br>
        <button onclick="startMatrix()">ПІДКЛЮЧИТИСЯ</button>
        <p id="error-msg" style="color: red; display: none;"></p>
    </div>

    <canvas id="nes-canvas" width="256" height="240"></canvas>
    <div class="status" id="controls">Керування: Стрілки та клавіші Z, X, Enter, Space</div>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(256, 240);
        const buf = new Uint32Array(imageData.data.buffer);

        const nes = new jsnes.NES({
            onFrame: (frameBuffer) => {
                for (var i = 0; i < 256 * 240; i++) buf[i] = 0xFF000000 | frameBuffer[i];
                ctx.putImageData(imageData, 0, 0);
            }
        });

        async function startMatrix() {
            // 1. Отримуємо і обробляємо ім'я
            let nameInput = document.getElementById('userName').value.toUpperCase();
            nameInput = nameInput.replace(/[^A-Z0-9 ]/g, ''); // Залишаємо тільки латиницю і цифри
            
            if (nameInput === "") nameInput = "NEO";
            // Додаємо пробіли, якщо ім'я коротше 6 літер, щоб не зламати розмір файлу
            nameInput = nameInput.padEnd(6, ' ').substring(0, 6);

            // 2. Змінюємо інтерфейс
            document.getElementById('login-screen').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('controls').style.display = 'block';

            try {
                // 3. Завантажуємо файл гри
                const response = await fetch('matrix.nes');
                if (!response.ok) throw new Error('Файл гри не знайдено!');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);

                // --- 4. ХАКЕРСЬКИЙ ПАТЧ ПАМ'ЯТІ ---
                // Шукаємо байти слова "VIKTOR" (в ASCII це 86, 73, 75, 84, 79, 82)
                let offset = -1;
                for (let i = 0; i < data.length - 6; i++) {
                    if (data[i] === 86 && data[i+1] === 73 && data[i+2] === 75 &&
                        data[i+3] === 84 && data[i+4] === 79 && data[i+5] === 82) {
                        offset = i;
                        break;
                    }
                }

                // Якщо знайшли — перезаписуємо на нове ім'я
                if (offset !== -1) {
                    for (let i = 0; i < 6; i++) {
                        data[offset + i] = nameInput.charCodeAt(i);
                    }
                }
                // -----------------------------------

                // 5. Конвертуємо і запускаємо емулятор
                let binary = "";
                for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
                
                nes.loadROM(binary);
                
                // Налаштування клавіатури
                const keyboard = (keyCode, event) => {
                    const map = { 38: 16, 40: 32, 37: 64, 39: 128, 88: 1, 90: 2, 13: 8, 32: 4 };
                    if (map[keyCode]) {
                        event === 'down' ? nes.buttonDown(1, map[keyCode]) : nes.buttonUp(1, map[keyCode]);
                    }
                };
                window.addEventListener("keydown", (e) => keyboard(e.keyCode, 'down'));
                window.addEventListener("keyup", (e) => keyboard(e.keyCode, 'up'));

                setInterval(() => { nes.frame(); }, 16.6); // Запуск 60 FPS

            } catch (err) {
                document.getElementById('error-msg').innerText = err.message;
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('login-screen').style.display = 'block';
                canvas.style.display = 'none';
            }
        }
    </script>
</body>
</html>

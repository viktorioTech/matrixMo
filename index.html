<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Matrix Mo 2026 - The Final Unified Version</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Ефект старого монітора */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; z-index: 999; pointer-events: none;
        }

        .ui { position: relative; z-index: 10; text-align: center; background: rgba(0,0,0,0.85); padding: 30px; border: 1px solid #00ff00; box-shadow: 0 0 25px #004400; max-width: 750px; }
        
        /* Вибір персонажа */
        .char-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        
        /* ПЛАВНА ЛЕВІТАЦІЯ (10 секунд) */
        .char-card { 
            border: 1px solid #004400; padding: 10px; cursor: pointer; transition: 0.3s; 
            background: #000500; width: 110px; 
            animation: float 10s ease-in-out infinite; 
        }
        .char-card:nth-child(1) { animation-delay: 0s; }
        .char-card:nth-child(2) { animation-delay: 2.5s; }
        .char-card:nth-child(3) { animation-delay: 5s; }
        .char-card:nth-child(4) { animation-delay: 7.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); border-color: #0f0; }
        }

        /* Містична Анна */
        .mystic { border-color: #ff00ff !important; box-shadow: 0 0 10px #aa00aa; }
        .mystic:hover { box-shadow: 0 0 20px #ff00ff !important; }

        .char-card:hover { border-color: #00ff00; transform: scale(1.1) !important; animation-play-state: paused; }
        .char-card img { width: 80px; height: 80px; image-rendering: pixelated; }
        
        input[type="text"] { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-family: inherit; font-size: 18px; text-align: center; width: 250px; outline: none; margin-bottom: 15px; }
        .btn { background: #003300; color: #00ff00; border: 1px solid #00ff00; padding: 10px 25px; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn:hover { background: #00ff00; color: #000; }

        #story-screen, #final-animation, #game-ui { display: none; }
        .story-img { width: 100%; max-width: 500px; border: 1px solid #00ff00; margin-bottom: 20px; box-shadow: 0 0 20px #004400; }
        
        /* Game UI */
        #game-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; width: 300px; background: rgba(0,0,0,0.7); border: 1px solid #0f0; padding: 10px; text-align: center; }
        #sync-bar-container { width: 100%; height: 20px; border: 1px solid #0f0; margin-top: 5px; }
        #sync-bar { width: 0%; height: 100%; background: #0f0; transition: 0.1s; }

        #typing-text { font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        #hero-sprite { position: absolute; z-index: 5; display: none; width: 80px; image-rendering: pixelated; pointer-events: none; }
        #error-msg { color: #ff0000; height: 20px; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    
    <div id="game-ui">
        <div>SYSTEM SYNC: <span id="sync-val">0</span>%</div>
        <div id="sync-bar-container"><div id="sync-bar"></div></div>
        <div style="font-size: 11px; margin-top: 5px;">USE ARROWS OR A/D TO MOVE</div>
    </div>

    <img id="hero-sprite" src="" alt="Hero">

    <div id="login-screen" class="ui">
        <h2 id="glitch-title">IDENTIFY YOURSELF</h2>
        <div class="char-container">
            <div onclick="setChar('OLEH', 'oleh.png')" class="char-card"><img src="oleh.png"><br>ОЛЕГ</div>
            <div onclick="setChar('VIKTOR', 'viktor.png')" class="char-card"><img src="viktor.png"><br>ВІКТОР</div>
            <div onclick="setChar('VOLODY', 'volodymyr.png')" class="char-card"><img src="volodymyr.png"><br>ВОЛОДИМИР</div>
            <div onclick="setChar('ANNA', 'anna.png')" class="char-card mystic"><img src="anna.png"><br>АННА</div>
        </div>
        <p>АБО ВВЕДІТЬ СВОЄ ІМ'Я:</p>
        <input type="text" id="userName" maxlength="12" placeholder="NEO" autocomplete="off">
        <div id="error-msg"></div>
        <button class="btn" onclick="validateAndStart()">ІНІЦІАЛІЗАЦІЯ</button>
    </div>

    <div id="story-screen" class="ui">
        <img src="Vov.png" class="story-img">
        <p id="story-para">Львів. 2026 рік. Відділ розробки.<br>Збирай шматки коду, щоб стабілізувати систему!</p>
        <button class="btn" onclick="startWakeUp()">ПРОДОВЖИТИ</button>
    </div>

    <div id="final-animation" class="ui" style="border:none; background:none; box-shadow:none;">
        <div id="typing-text"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        
        let selectedName = "";
        let heroImg = "";
        let isGaming = false;
        let syncScore = 0;
        let heroX = w / 2;
        const heroes = {'OLEH': 'oleh.png', 'VIKTOR': 'viktor.png', 'VOLODY': 'volodymyr.png', 'ANNA': 'anna.png'};

        // --- ПОВІЛЬНИЙ МАТРИЧНИЙ ДОЩ (150ms інтервал) ---
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$+-*/=%".split("");
        const fontSize = 16;
        const columns = Math.floor(w / fontSize);
        const drops = Array(columns).fill(1);
        const fragments = [];

        function drawRain() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > h && Math.random() > 0.99) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawRain, 150); // Уповільнено за запитом

        function gameLoop() {
            if (isGaming) updateGame();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

        // --- ГЕЙМПЛЕЙ ---
        function updateGame() {
            if (Math.random() > 0.96) {
                fragments.push({ x: Math.random() * w, y: -20, char: chars[Math.floor(Math.random()*chars.length)] });
            }

            ctx.fillStyle = (selectedName.toUpperCase() === "ANNA") ? "#ff00ff" : "#fff";
            ctx.font = "bold 24px monospace";
            for (let i = fragments.length - 1; i >= 0; i--) {
                fragments[i].y += 4; // Плавна швидкість падіння
                ctx.fillText(fragments[i].char, fragments[i].x, fragments[i].y);

                const hero = document.getElementById('hero-sprite');
                const hRect = hero.getBoundingClientRect();
                
                if (fragments[i].y > hRect.top && fragments[i].y < hRect.bottom &&
                    fragments[i].x > hRect.left && fragments[i].x < hRect.right) {
                    fragments.splice(i, 1);
                    updateSync(5);
                    continue;
                }
                if (fragments[i].y > h) fragments.splice(i, 1);
            }
            document.getElementById('hero-sprite').style.left = heroX + "px";
        }

        function updateSync(val) {
            syncScore += val;
            if (syncScore > 100) syncScore = 100;
            document.getElementById('sync-val').innerText = syncScore;
            document.getElementById('sync-bar').style.width = syncScore + "%";
            if (syncScore === 100 && isGaming) {
                isGaming = false;
                alert(selectedName.toUpperCase() === "ANNA" ? "THE MATRIX IS REDEFINED. WELCOME, ANNA." : "WELCOME TO REALITY, " + selectedName);
                location.reload();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (!isGaming) return;
            if (e.key === "ArrowLeft" || e.key === "a") heroX -= 30;
            if (e.key === "ArrowRight" || e.key === "d") heroX += 30;
            if (heroX < 50) heroX = 50; if (heroX > w - 50) heroX = w - 50;
        });

        // --- ПЕРЕХОДИ ---
        function setChar(name, img) {
            document.getElementById('userName').value = name;
            validateAndStart();
        }

        function validateAndStart() {
            const input = document.getElementById('userName').value.trim();
            const error = document.getElementById('error-msg');
            if (/[А-Яа-яЁёІіЇїЄєҐґ]/.test(input)) {
                error.innerText = "Шо ти голова? Тільки латиниця!";
                return;
            }
            selectedName = input || "NEO";
            heroImg = heroes[selectedName.toUpperCase()] || "viktor.png";

            if (selectedName.toUpperCase() === "ANNA") {
                document.getElementById('story-para').innerHTML = "Знайдено невідомий протокол...<br>Анна входить у потік. Світ уже не буде таким.";
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('story-screen').style.display = 'block';
        }

        function startWakeUp() {
            document.getElementById('story-screen').style.display = 'none';
            document.getElementById('final-animation').style.display = 'block';
            const text = `WAKE UP, ${selectedName.toUpperCase()}...`;
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById('typing-text').innerHTML += text.charAt(i);
                    i++; setTimeout(type, 150);
                } else {
                    setTimeout(() => {
                        document.getElementById('final-animation').style.display = 'none';
                        const hero = document.getElementById('hero-sprite');
                        hero.src = heroImg;
                        hero.style.display = 'block';
                        hero.style.top = (h - 100) + "px";
                        if (selectedName.toUpperCase() === "ANNA") hero.style.filter = "drop-shadow(0 0 15px #ff00ff) hue-rotate(280deg)";
                        document.getElementById('game-ui').style.display = 'block';
                        isGaming = true;
                    }, 1000);
                }
            }
            type();
        }

        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    </script>
</body>
</html>

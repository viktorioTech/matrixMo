<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NES Matrix Mo 2026 - Optimized Interface</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            user-select: none;
            position: relative; /* Для ефекту монітора */
        }
        
        /* Ефект старого монітора (Scanlines) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none; /* Щоб не заважало клікати */
        }

        /* Задній фон з Матричним дощем */
        #matrix-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.5;
        }
        
        /* Екран логіну */
        #login-screen { text-align: center; max-width: 600px; z-index: 10; position: relative; }
        
        /* Анімація заголовка (глітч) - Сповільнена */
        h2 { text-shadow: 2px 0px 5px #00ff00, -2px 0px 5px #008800; animation: glitch 6s infinite; }
        @keyframes glitch {
            0% { transform: translate(0) }
            10% { transform: translate(-2px, 1px) }
            20% { transform: translate(-1px, -1px) }
            30% { transform: translate(2px, 1px) }
            40% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        .char-container { display: flex; gap: 30px; justify-content: center; margin-bottom: 30px; margin-top: 20px;}
        
        /* Картки героїв + Анімація левітації - Змінено на 10 секунд (ДУЖЕ ПЛАВНО) */
        .char-card { 
            border: 2px solid #005500; padding: 15px; cursor: pointer; transition: 0.3s; 
            background-color: rgba(0, 17, 0, 0.8); 
            animation: float 10s ease-in-out infinite; /* Набагато повільніше погойдування */
        }
        /* Різна затримка, щоб вони гойдалися не одночасно */
        .char-card:nth-child(1) { animation-delay: 0s; }
        .char-card:nth-child(2) { animation-delay: 3s; }
        .char-card:nth-child(3) { animation-delay: 6s; }
        
        /* Плавні ключові кадри левітації - Зменшено діапазон руху */
        @keyframes float {
            0% { transform: translateY(0px); box-shadow: 0 0 5px #005500; }
            50% { transform: translateY(-10px); box-shadow: 0 10px 15px #00ff00; border-color: #00ff00; }
            100% { transform: translateY(0px); box-shadow: 0 0 5px #005500; }
        }

        .char-card:hover { background-color: #003300; transform: scale(1.1) !important; animation-play-state: paused; }
        .char-card img { width: 100px; height: 100px; image-rendering: pixelated; margin-bottom: 10px; }
        .char-name { font-weight: bold; font-size: 18px; text-shadow: 0 0 5px #00ff00;}
        
        /* Поле ручного введення */
        input[type="text"] { background-color: #000; color: #00ff00; border: 1px solid #00ff00; font-family: 'Courier New', Courier, monospace; font-size: 20px; padding: 8px; text-transform: uppercase; text-align: center; width: 180px; margin-bottom: 10px; outline: none; z-index: 10; position: relative;}
        
        /* Основна кнопка запуску */
        .start-btn { background-color: #003300; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 18px; z-index: 10; position: relative;}
        .start-btn:hover { background-color: #00ff00; color: #000; box-shadow: 0 0 10px #00ff00;}
        
        #error-msg { margin-top: 15px; font-weight: bold; min-height: 24px; text-shadow: 0 0 5px red; }

        /* Екрани історії та гри */
        #scene-screen { display: none; text-align: center; max-width: 600px; z-index: 10; position: relative;}
        .office-scene { width: 100%; max-width: 500px; border: 2px solid #00ff00; image-rendering: pixelated; margin-bottom: 20px; box-shadow: 0 0 30px #008800; }
        
        /* Миготливий текст завантаження - Теж трохи сповільнено */
        .loading-text { font-size: 24px; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        canvas#nes-canvas { border: 2px solid #00ff00; image-rendering: pixelated; width: 512px; height: 480px; display: none; box-shadow: 0 0 30px #00ff00; z-index: 10; position: relative;}
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="login-screen">
        <h2>ОБЕРІТЬ СВОГО АВАТАРА</h2>
        <div class="char-container">
            <div class="char-card" onclick="prepareScene('OLEH')">
                <img src="oleh.png" alt="Олег">
                <div class="char-name">ОЛЕГ</div>
            </div>
            
            <div class="char-card" onclick="prepareScene('VIKTOR')">
                <img src="viktor.png" alt="Віктор">
                <div class="char-name">ВІКТОР</div>
            </div>
            
            <div class="char-card" onclick="prepareScene('VOLODY')">
                <img src="volodymyr.png" alt="Володимир">
                <div class="char-name">ВОЛОДИМИР</div>
            </div>
        </div>

        <p>АБО ВВЕДІТЬ КОДОВЕ ІМ'Я:</p>
        <input type="text" id="userName" maxlength="6" placeholder="NEO" autocomplete="off" spellcheck="false">
        <button class="start-btn" onclick="startMatrix()">ІНІЦІАЛІЗАЦІЯ</button>
        <p id="error-msg" style="color: red; display: none;"></p>
    </div>

    <div id="scene-screen">
        <h2 id="scene-title">ЛОКАЦІЯ: ОФІС 2026</h2>
        <img src="Vov.png" class="office-scene" alt="Office Scene">
        <p class="loading-text">ВСТАНОВЛЕННЯ ЗВ'ЯЗКУ З <span id="target-name">...</span></p>
    </div>

    <canvas id="nes-canvas" width="256" height="240"></canvas>

    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <script>
        // --- АНІМАЦІЯ МАТРИЧНОГО ДОЩУ (HTML Canvas) - ОПТИМІЗАЦІЯ ШВИДКОСТІ ---
        const bgCanvas = document.getElementById('matrix-bg');
        const bgCtx = bgCanvas.getContext('2d');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789АБВГДЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ'.split('');
        const fontSize = 16;
        const columns = bgCanvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;

        function drawBg() {
            bgCtx.fillStyle = 'rgba(0, 0, 0, 0.03)'; // Зменшено прозорість для м'якшого затухання
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = '#0F0';
            bgCtx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                bgCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > bgCanvas.height && Math.random() > 0.99) drops[i] = 0; // Повільніша перевірка спавну
                drops[i]++;
            }
        }
        // ЗМІНЕНО: Інтервал збільшено з 33мс до 150мс для набагато повільнішого дощу.
        let bgInterval = setInterval(drawBg, 150); 

        // --- ЛОГІКА ПЕРЕХОДІВ ---
        function prepareScene(name) {
            if (name) document.getElementById('userName').value = name;
            let rawInput = document.getElementById('userName').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (/[А-Яа-яЁёІіЇїЄєҐґ]/.test(rawInput)) {
                errorMsg.innerText = "Шо ти голова?";
                errorMsg.style.display = 'block';
                return;
            }

            let finalName = rawInput.toUpperCase().replace(/[^A-Z0-9 ]/g, '') || "NEO";
            
            // Ховаємо меню
            document.getElementById('login-screen').style.display = 'none';
            // Вимикаємо фоновий дощ, щоб не гальмувало гру
            clearInterval(bgInterval); 
            document.getElementById('matrix-bg').style.display = 'none';

            // Показуємо заставку (історію)
            document.getElementById('scene-screen').style.display = 'block';
            document.getElementById('target-name').innerText = finalName;

            // Запускаємо NES гру через невелику затримку
            setTimeout(() => {
                startMatrix(finalName);
            }, 3000); // 3 секунди на перегляд сюжетного екрана
        }

        // --- ЛОГІКА ЕМУЛЯТОРА NES (JSNES) ---
        const canvas = document.getElementById('nes-canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(256, 240);
        const buf = new Uint32Array(imageData.data.buffer);

        const nes = new jsnes.NES({
            onFrame: (frameBuffer) => {
                for (var i = 0; i < 256 * 240; i++) buf[i] = 0xFF000000 | frameBuffer[i];
                ctx.putImageData(imageData, 0, 0);
            }
        });

        async function startMatrix(nameInput) {
            // Перехід від сюжетного екрана (PNG) до Canvas емулятора
            document.getElementById('scene-screen').style.display = 'none';
            canvas.style.display = 'block';

            nameInput = nameInput.padEnd(6, ' ').substring(0, 6);

            try {
                const response = await fetch('matrix.nes');
                if (!response.ok) throw new Error('System error: matrix.nes not found.');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);

                // --- ХОТ-ПАТЧИНГ ROM (Заміна 'VIKTOR' на Ім'я Юзера) ---
                const pattern = [86, 73, 75, 84, 79, 82]; // Байти V-I-K-T-O-R
                let offset = -1;
                for (let i = 0; i < data.length - 6; i++) {
                    if (data[i] === pattern[0] && data[i+1] === pattern[1] &&
                        data[i+2] === pattern[2] && data[i+3] === pattern[3] &&
                        data[i+4] === pattern[4] && data[i+5] === pattern[5]) {
                        offset = i;
                        break;
                    }
                }

                if (offset !== -1) {
                    for (let i = 0; i < 6; i++) {
                        data[offset + i] = nameInput.charCodeAt(i);
                    }
                } else {
                    console.error("Pattern 'VIKTOR' for patching not found in ROM.");
                }

                let binary = "";
                for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
                nes.loadROM(binary);
                
                // --- ОБРОБКА ВВОДУ ---
                const keyboard = (keyCode, event) => {
                    const map = { 38: 16, 40: 32, 37: 64, 39: 128, 88: 1, 90: 2, 13: 8, 32: 4 };
                    if (map[keyCode]) {
                        event === 'down' ? nes.buttonDown(1, map[keyCode]) : nes.buttonUp(1, map[keyCode]);
                    }
                };
                window.addEventListener("keydown", (e) => keyboard(e.keyCode, 'down'));
                window.addEventListener("keyup", (e) => keyboard(e.keyCode, 'up'));

                // --- ГОЛОВНИЙ ЦИКЛ ЕМУЛЯЦІЇ ---
                setInterval(() => { nes.frame(); }, 16.6); // Цільові 60 FPS

            } catch (err) {
                alert("Matrix Critical Error: " + err.message);
                document.getElementById('login-screen').style.display = 'block';
                canvas.style.display = 'none';
            }
        }
    </script>
</body>
</html>
